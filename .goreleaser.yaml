# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: echo-server

report_sizes: true

env:
  - CGO_ENABLED=0

builds:
  - binary: echo-server
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s -w

checksum:
  name_template: checksums.txt
  algorithm: sha256

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

scoops:
  - repository:
      owner: gechr
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/gechr/echo-server
    description: HTTP echo server that returns request details as JSON
    license: MIT
